<!-- src/main/resources/static/index.html -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Coin Auto Trader - Login</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 단일 CSS -->
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-logo-row">
            <img src="/img/logo-icon.png" alt="앱 로고" class="login-logo-icon">
            <span class="login-app-title">Coin Auto Trader</span>
        </div>

        <p class="login-description">
            카카오 로그인을 통해<br>
            자동매매 현황 페이지에 접속합니다.
        </p>

        <button type="button"
                class="btn btn-login login-kakao-btn"
                onclick="location.href='/oauth2/authorization/kakao'">
            카카오 로그인
        </button>

        <!-- 로그아웃 유도 문구 (간단 + 진한 글씨), 추후 보안면에서 확장 가능. -->
        <p class="login-help-text">
            <strong>⚠️창을 닫기 전 반드시 완전 로그아웃 하세요⚠️</strong>
        </p>

        <p class="login-help-text">
            화이트리스트에 등록된 카카오 계정만<br>
            대시보드에 접근할 수 있습니다.
        </p>
    </div>
</div>
</body>
</html>
